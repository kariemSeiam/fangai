name: Bug Report
description: Report a bug in Fang (@fangai/cli)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command you ran
      description: The full `fang` (or `a2a-cli`) command that caused the issue.
      placeholder: "fang wrap 'pi --mode rpc' --port 3001"
    validations:
      required: true

  - type: input
    id: cli-agent
    attributes:
      label: CLI Agent
      description: Which CLI agent were you wrapping?
      placeholder: "pi v1.2.3 / aider v0.45.0 / claude v1.0.0 / other"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node -v`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: fang-version
    attributes:
      label: Fang CLI version
      description: Output of `fang --version` (or `a2a-cli --version`)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant log output.
      render: shell
