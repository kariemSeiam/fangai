packages:
  - "packages/*"
  - "packages/adapters/*"

# Install optional native bindings (e.g. Rollup/Vite) for these platforms so the same
# node_modules works under Windows and WSL/Linux (optional deps default to host-only).
supportedArchitectures:
  os:
    - win32
    - linux
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl
