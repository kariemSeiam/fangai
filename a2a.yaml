# Example a2a.yaml Configuration
# Place this in your project root or specify with --config

agents:
  # ─── pi: your daily driver ───
  # Fast, cheap, full observability via RPC mode
  pi:
    cli: "pi --mode rpc"
    port: 3001
    name: pi-agent
    cost_tier: cheap
    model: glm-5.1
    skills:
      - typescript
      - react
      - python
      - flask
      - refactor
      - debug
    max_parallel: 4

  # ─── claude: your heavy thinker ───
  # Expensive but deep reasoning for architecture and security
  claude:
    cli: "claude --print"
    port: 3002
    name: claude-agent
    cost_tier: paid
    model: claude-sonnet-4-20250514
    skills:
      - architecture
      - complex-reasoning
      - security
      - multi-file-refactor
    max_parallel: 2

  # ─── aider: your git specialist ───
  # Best-in-class git integration, perfect for large refactors
  aider:
    cli: "aider --no-auto-commits --json"
    port: 3003
    name: aider-agent
    cost_tier: paid
    skills:
      - git-native
      - large-refactor
      - multi-file
      - codebase-restructure
    max_parallel: 2

  # ─── local: your private worker ───
  # Free, offline, runs on your GPU. For sensitive code and quick edits.
  local:
    cli: "ollama run qwen2.5-coder:32b"
    port: 3004
    name: local-agent
    cost_tier: free
    skills:
      - quick-edits
      - offline
      - sensitive-code
      - private
    max_parallel: 2

# ─── Global Settings ───
defaults:
  timeout: 300          # seconds before task is killed
  ttl: 60               # seconds completed tasks are kept
  log_level: info       # debug | info | warn | error

# ─── Security ───
security:
  allowed_origins:
    - "http://localhost:*"
    - "http://127.0.0.1:*"
  # allowed_ips:          # uncomment to restrict by IP
  #   - "127.0.0.1"
  #   - "192.168.1.0/24"
