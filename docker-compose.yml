version: '3.9'

services:
  pi:
    build: .
    ports: ["3001:3001"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["node", "--experimental-strip-types", "src/cli.ts", "wrap", "pi --mode rpc", "--port", "3001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  claude:
    build: .
    ports: ["3002:3002"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["node", "--experimental-strip-types", "src/cli.ts", "wrap", "claude", "--port", "3002"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  aider:
    build: .
    ports: ["3003:3003"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: ["node", "--experimental-strip-types", "src/cli.ts", "wrap", "aider", "--port", "3003"]

  ollama:
    build: .
    ports: ["3005:3005"]
    command: ["node", "--experimental-strip-types", "src/cli.ts", "wrap", "ollama run qwen2.5-coder", "--port", "3005"]
